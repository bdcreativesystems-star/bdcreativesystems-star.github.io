---
layout: default
---

<article class="post-shell">
  <header class="post-hero">
    <p class="post-date">{{ page.date | date: "%B %d, %Y" }}</p>
    <h1>{{ page.title }}</h1>

    {% if page.tags %}
    <div class="post-tags">
      {% for tag in page.tags %}
      <span>{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}
  </header>

  <div class="post-content prose">
    {{ content }}
  </div>
</article>
